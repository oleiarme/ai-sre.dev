<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI SRE — Site Reliability Engineer</title>
  <meta name="description" content="AI-driven Site Reliability Engineer — building resilient, automated infrastructure">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz48dGV4dCB5PScuOWVtJyBmb250LXNpemU9JzkwJz7imqE8L3RleHQ+PC9zdmc+">
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="terminal">
    <div class="terminal-bar">
      <span class="dot red" aria-hidden="true"></span>
      <span class="dot yellow" aria-hidden="true"></span>
      <span class="dot green" aria-hidden="true"></span>
      <span class="title">ai-sre@dev:~</span>
    </div>
    <div class="terminal-body" id="output"></div>
    <div class="input-line">
      <span class="prompt">ai-sre@dev:~$ </span>
      <span id="cursor" class="cursor">█</span>
    </div>
    <div class="nav-bar">
      <button data-cmd="about" aria-label="About command">about</button>
      <button data-cmd="skills" aria-label="Skills command">skills</button>
      <button data-cmd="experience" aria-label="Experience command">experience</button>
      <button data-cmd="projects" aria-label="Projects command">projects</button>
      <button data-cmd="classify" aria-label="Classify command">classify</button>
      <button data-cmd="contact" aria-label="Contact command">contact</button>
      <button data-cmd="help" aria-label="Help command">help</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
