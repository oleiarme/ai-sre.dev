<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI SRE — Site Reliability Engineer</title>
  <meta name="description" content="AI-driven Site Reliability Engineer — building resilient, automated infrastructure">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="terminal">
    <div class="terminal-bar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="title">ai-sre@dev:~</span>
    </div>
    <div class="terminal-body" id="output"></div>
    <div class="input-line">
      <span class="prompt">ai-sre@dev:~$ </span>
      <span id="cursor" class="cursor">█</span>
    </div>
    <div class="nav-bar">
      <button data-cmd="about">about</button>
      <button data-cmd="skills">skills</button>
      <button data-cmd="experience">experience</button>
      <button data-cmd="projects">projects</button>
      <button data-cmd="classify">classify</button>
      <button data-cmd="contact">contact</button>
      <button data-cmd="help">help</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
