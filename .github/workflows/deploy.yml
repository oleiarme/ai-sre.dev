name: Test & Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: static/
          css: false

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --exclude-loopback
            --exclude "localhost"
            --exclude "t.me"
            --exclude "linkedin.com"
            --exclude "oleiarme.github.io"
            static/index.html
          fail: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --upload.target=temporary-public-storage \
            --collect.staticDistDir=./static \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=["warn",{"minScore":0.7}] \
            --assert.assertions.categories:accessibility=["error",{"minScore":0.8}] \
            --assert.assertions.categories:seo=["warn",{"minScore":0.8}]
        continue-on-error: true

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./static"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
